<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MOB CARD - SPEED</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    margin: 0;
    background: radial-gradient(circle at top, #234, #071018 70%);
    color: white;
    font-family: system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
  }

  #game {
    width: 100vw;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    background: linear-gradient(#123, #061018);
    overflow: hidden;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    padding: 20px;
  }

  .screen.active {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  h1 {
    font-size: 40px;
    margin: 0 0 20px;
    letter-spacing: 2px;
  }

  button {
    border: none;
    border-radius: 14px;
    padding: 14px 24px;
    margin: 8px;
    font-size: 18px;
    font-weight: bold;
    background: #fff;
    color: #111;
  }

  .redBtn {
    background: #ff4b5c;
    color: white;
  }

  .blackBtn {
    background: #222;
    color: white;
    border: 2px solid #fff;
  }

  #hud {
    position: absolute;
    top: 8px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    font-weight: bold;
    font-size: 14px;
    z-index: 10;
  }

  #enemyArea {
    position: absolute;
    top: 55px;
    left: 0;
    right: 0;
    height: 160px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  #centerArea {
    position: absolute;
    top: 255px;
    left: 0;
    right: 0;
    height: 130px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
  }

  #playerArea {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    height: 170px;
    display: flex;
    justify-content: center;
    align-items: end;
    gap: 8px;
  }

  .card {
    width: 66px;
    height: 94px;
    border-radius: 10px;
    background: white;
    color: #111;
    border: 3px solid #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    box-shadow: 0 6px 0 rgba(0,0,0,.35);
    position: relative;
  }

  .card.red {
    color: #d92135;
  }

  .card.black {
    color: #111;
  }

  .card.back {
    background: repeating-linear-gradient(
      45deg,
      #1a4cff,
      #1a4cff 8px,
      #0b1f6d 8px,
      #0b1f6d 16px
    );
    color: white;
  }

  .centerCard {
    width: 78px;
    height: 108px;
    font-size: 28px;
  }

  .handCard {
    transition: transform .15s;
  }

  .handCard:active {
    transform: translateY(-14px) scale(1.05);
  }

  #message {
    position: absolute;
    top: 405px;
    left: 12px;
    right: 12px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    min-height: 32px;
  }

  #resultPanel {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.82);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 50;
  }

  #resultPanel.show {
    display: flex;
  }

  #resultTitle {
    font-size: 42px;
    font-weight: 900;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<div id="game">

  <div id="titleScreen" class="screen active">
    <h1>MOB CARD</h1>
    <p>スピード</p>
    <p>使う色を選んでください</p>
    <button class="redBtn" onclick="startGame('red')">赤カードで遊ぶ</button>
    <button class="blackBtn" onclick="startGame('black')">黒カードで遊ぶ</button>
  </div>

  <div id="playScreen" class="screen">
    <div id="hud">
      <div>YOU 山札:<span id="playerDeckCount">0</span></div>
      <div>CPU 山札:<span id="enemyDeckCount">0</span></div>
    </div>

    <div id="enemyArea"></div>
    <div id="centerArea"></div>
    <div id="message">手札を中央カードへフリック！</div>
    <div id="playerArea"></div>

    <div id="resultPanel">
      <div id="resultTitle"></div>
      <button onclick="backTitle()">タイトルへ</button>
      <button onclick="restart()">もう一度</button>
    </div>
  </div>

</div>

<script>
'use strict';

const titleScreen = document.getElementById('titleScreen');
const playScreen = document.getElementById('playScreen');
const playerArea = document.getElementById('playerArea');
const enemyArea = document.getElementById('enemyArea');
const centerArea = document.getElementById('centerArea');
const message = document.getElementById('message');
const resultPanel = document.getElementById('resultPanel');
const resultTitle = document.getElementById('resultTitle');
const playerDeckCount = document.getElementById('playerDeckCount');
const enemyDeckCount = document.getElementById('enemyDeckCount');

let selectedColor = 'red';

let playerDeck = [];
let enemyDeck = [];
let playerHand = [];
let enemyHand = [];
let centerCards = [];

let draggingCard = null;
let startX = 0;
let startY = 0;
let gameOver = false;
let enemyTimer = null;

const CARD_NAMES = {
  1: 'A',
  11: 'J',
  12: 'Q',
  13: 'K'
};

function cardLabel(num) {
  return CARD_NAMES[num] || String(num);
}

function makeDeck(color) {
  const suits = color === 'red'
    ? ['♥', '♦']
    : ['♠', '♣'];

  const deck = [];
  for (const suit of suits) {
    for (let n = 1; n <= 13; n++) {
      deck.push({
        num: n,
        suit,
        color
      });
    }
  }
  return shuffle(deck);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame(color) {
  selectedColor = color;
  titleScreen.classList.remove('active');
  playScreen.classList.add('active');
  setupGame();
}

function setupGame() {
  gameOver = false;
  resultPanel.classList.remove('show');
  message.textContent = '手札を中央カードへフリック！';

  const fullDeck = makeDeck(selectedColor);

  playerDeck = fullDeck.slice(0, 13);
  enemyDeck = fullDeck.slice(13, 26);

  centerCards = [
    playerDeck.pop(),
    enemyDeck.pop()
  ];

  playerHand = [];
  enemyHand = [];

  drawToHand(playerDeck, playerHand);
  drawToHand(enemyDeck, enemyHand);

  render();

  clearInterval(enemyTimer);
  enemyTimer = setInterval(enemyPlay, 900);
}

function drawToHand(deck, hand) {
  while (hand.length < 4 && deck.length > 0) {
    hand.push(deck.pop());
  }
}

function canPlace(card, center) {
  if (!card || !center) return false;

  const up = center.num === 13 ? 1 : center.num + 1;
  const down = center.num === 1 ? 13 : center.num - 1;

  return card.num === up || card.num === down;
}

function render() {
  playerArea.innerHTML = '';
  enemyArea.innerHTML = '';
  centerArea.innerHTML = '';

  playerDeckCount.textContent = playerDeck.length;
  enemyDeckCount.textContent = enemyDeck.length;

  enemyHand.forEach(() => {
    enemyArea.appendChild(createBackCard());
  });

  centerCards.forEach((card, index) => {
    const el = createCard(card);
    el.classList.add('centerCard');
    el.dataset.centerIndex = index;
    centerArea.appendChild(el);
  });

  playerHand.forEach((card, index) => {
    const el = createCard(card);
    el.classList.add('handCard');
    el.dataset.handIndex = index;
    attachFlick(el);
    playerArea.appendChild(el);
  });

  checkResult();
}

function createCard(card) {
  const el = document.createElement('div');
  el.className = 'card ' + card.color;
  el.innerHTML = `
    <div>${cardLabel(card.num)}</div>
    <div>${card.suit}</div>
  `;
  return el;
}

function createBackCard() {
  const el = document.createElement('div');
  el.className = 'card back';
  el.textContent = 'CARD';
  return el;
}

function attachFlick(el) {
  el.addEventListener('pointerdown', e => {
    if (gameOver) return;

    draggingCard = el;
    startX = e.clientX;
    startY = e.clientY;
    el.setPointerCapture(e.pointerId);
  });

  el.addEventListener('pointerup', e => {
    if (!draggingCard || gameOver) return;

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;

    const isFlickUp = dy < -35 && Math.abs(dy) > Math.abs(dx);

    if (isFlickUp) {
      tryPlayerPlace(Number(el.dataset.handIndex));
    } else {
      message.textContent = '上にフリックして出してください';
    }

    draggingCard = null;
  });
}

function tryPlayerPlace(handIndex) {
  const card = playerHand[handIndex];
  if (!card) return;

  const targetIndex = findPlaceTarget(card);

  if (targetIndex === -1) {
    message.textContent = 'そのカードは出せません';
    return;
  }

  centerCards[targetIndex] = card;
  playerHand.splice(handIndex, 1);
  drawToHand(playerDeck, playerHand);

  message.textContent = `${cardLabel(card.num)}${card.suit} を出した！`;
  render();
}

function findPlaceTarget(card) {
  for (let i = 0; i < centerCards.length; i++) {
    if (canPlace(card, centerCards[i])) {
      return i;
    }
  }
  return -1;
}

function enemyPlay() {
  if (gameOver) return;

  for (let i = 0; i < enemyHand.length; i++) {
    const card = enemyHand[i];
    const targetIndex = findPlaceTarget(card);

    if (targetIndex !== -1) {
      centerCards[targetIndex] = card;
      enemyHand.splice(i, 1);
      drawToHand(enemyDeck, enemyHand);
      message.textContent = `CPUが ${cardLabel(card.num)}${card.suit} を出した！`;
      render();
      return;
    }
  }

  if (!hasAnyMove()) {
    resetCenterCards();
  }
}

function hasAnyMove() {
  return playerHand.some(card => findPlaceTarget(card) !== -1)
      || enemyHand.some(card => findPlaceTarget(card) !== -1);
}

function resetCenterCards() {
  if (playerDeck.length > 0) {
    centerCards[0] = playerDeck.pop();
  }

  if (enemyDeck.length > 0) {
    centerCards[1] = enemyDeck.pop();
  }

  message.textContent = '出せるカードなし！中央カードを交換！';
  render();
}

function checkResult() {
  if (gameOver) return;

  if (playerDeck.length === 0 && playerHand.length === 0) {
    finishGame(true);
    return;
  }

  if (enemyDeck.length === 0 && enemyHand.length === 0) {
    finishGame(false);
  }
}

function finishGame(win) {
  gameOver = true;
  clearInterval(enemyTimer);
  resultTitle.textContent = win ? 'WIN!' : 'LOSE...';
  resultPanel.classList.add('show');
}

function restart() {
  setupGame();
}

function backTitle() {
  clearInterval(enemyTimer);
  playScreen.classList.remove('active');
  titleScreen.classList.add('active');
}
</script>

</body>
</html>
