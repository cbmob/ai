<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wonda Music Library</title>
<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:"Arial Black","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
  background:linear-gradient(180deg,#fff7db 0%,#ffd36a 42%,#ff8a3d 100%);
  color:#241200;
  overflow-x:hidden;
}
button,input,textarea{font-family:inherit}
.app{max-width:560px;margin:0 auto;min-height:100vh;padding:14px}
.hero{
  padding:26px 16px 20px;
  border:4px solid #241200;
  border-radius:28px;
  background:
    radial-gradient(circle at 15% 20%,#ff2b7a 0 8%,transparent 9%),
    radial-gradient(circle at 82% 15%,#00c8ff 0 8%,transparent 9%),
    linear-gradient(135deg,#ff0055,#ff8a00,#fff200);
  box-shadow:0 8px 0 #241200;
  color:#fff;
  text-shadow:3px 3px 0 #241200;
  margin-bottom:18px;
}
.heroTop{display:flex;justify-content:space-between;align-items:center;gap:12px}
.logo{font-size:30px;line-height:1}
.sub{margin-top:8px;font-size:13px;color:#fffbd0}
.adminBtn{
  border:3px solid #fff;background:#241200;color:#fff200;border-radius:999px;
  padding:10px 12px;font-size:13px;box-shadow:0 4px 0 #000;
}
.status{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
.pill{
  display:inline-flex;align-items:center;gap:6px;background:#fff;color:#241200;
  border:3px solid #241200;border-radius:999px;padding:7px 10px;font-size:12px;text-shadow:none;
}
.searchBox{
  margin:18px 0;padding:14px;background:rgba(255,255,255,.9);
  border:4px solid #fff;border-radius:22px;box-shadow:0 6px 0 #241200;
}
.searchInput{
  width:100%;padding:14px 15px;border:3px solid #241200;border-radius:16px;
  font-size:16px;background:#fffef3;
}
.tagTabs{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;-webkit-overflow-scrolling:touch}
.tagTabs::-webkit-scrollbar{display:none}
.tagBtn{
  flex:0 0 auto;border:3px solid #241200;border-radius:999px;padding:10px 13px;
  background:#fff;color:#241200;box-shadow:0 4px 0 #241200;font-size:13px;white-space:nowrap;
}
.tagBtn.active{
  transform:translateY(3px);box-shadow:0 1px 0 #241200;
  background:linear-gradient(135deg,#ff0055,#ff8a00);color:#fff;text-shadow:2px 2px 0 #241200;
}
.sectionTitle{display:flex;align-items:center;justify-content:space-between;margin:18px 0 12px}
.sectionTitle h2{margin:0;font-size:22px;text-shadow:2px 2px 0 #fff}
.count{font-size:13px;background:#241200;color:#fff;border-radius:999px;padding:7px 10px}
.songList{display:grid;gap:14px;padding-bottom:90px}
.songCard{
  position:relative;padding:16px;border:4px solid #241200;border-radius:22px;
  background:#fffef6;box-shadow:0 6px 0 #241200;overflow:hidden;
}
.songCard:before{
  content:"";position:absolute;right:-24px;top:-24px;width:78px;height:78px;border-radius:50%;
  background:radial-gradient(circle,#fff 0 7px,#241200 8px 12px,#ff0055 13px 20px,#111 21px 34px,#fff200 35px 38px,#111 39px);
  opacity:.16;
}
.songTitle{
  position:relative;margin:0 0 5px;font-size:19px;line-height:1.35;color:#ff0055;
  word-break:keep-all;overflow-wrap:anywhere;
}
.artist{position:relative;font-family:system-ui,sans-serif;font-weight:900;font-size:13px;color:#6a3500;margin-bottom:10px}
.comment{position:relative;font-family:system-ui,sans-serif;font-weight:700;line-height:1.75;font-size:14px;margin:10px 0}
.songTags{position:relative;display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.songTag{
  display:inline-flex;align-items:center;justify-content:center;padding:5px 8px;border:2px solid #241200;
  border-radius:999px;background:#fff1b8;color:#241200;font-size:11px;font-weight:900;white-space:nowrap;cursor:pointer;
}
.songTag:active{transform:scale(.96)}
.actions{position:relative;display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.linkBtn,.smallBtn{
  display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border:3px solid #241200;
  border-radius:14px;padding:10px 12px;background:#ff003c;color:#fff;font-size:13px;box-shadow:0 4px 0 #241200;
}
.smallBtn{background:#fff;color:#241200}
.adminPanel{
  display:none;margin:18px 0;padding:16px;border:4px solid #241200;border-radius:24px;
  background:#f5edff;box-shadow:0 6px 0 #241200;
}
.adminPanel.show{display:block}
.adminPanel h2{margin:0 0 12px;color:#7b2cff}
.formGrid{display:grid;gap:10px}
.input,.textarea,.select{
  width:100%;padding:12px;border:3px solid #241200;border-radius:14px;background:#fff;font-size:14px;
}
.textarea{min-height:86px;resize:vertical}
.checkGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.checkItem{
  display:flex;gap:7px;align-items:center;padding:9px;background:#fff;border:2px solid #241200;
  border-radius:12px;font-family:system-ui,sans-serif;font-weight:800;font-size:13px;
}
.mainBtn{
  width:100%;border:4px solid #fff;border-radius:16px;padding:14px;
  background:linear-gradient(135deg,#7b2cff,#ff4de3);color:#fff;text-shadow:2px 2px 0 #241200;
  box-shadow:0 5px 0 #241200;font-size:16px;
}
.dangerBtn{background:linear-gradient(135deg,#ff003c,#ff8a00)}
.reloadBtn{background:linear-gradient(135deg,#00aaff,#00dd88)}
.notice{
  font-family:system-ui,sans-serif;font-weight:700;font-size:12px;line-height:1.6;
  background:#fff8dd;padding:10px;border:2px solid #241200;border-radius:12px;
}
.footer{text-align:center;padding:24px 0 40px;color:#6a3500;font-size:12px}
@media(max-width:390px){
  .app{padding:10px}
  .logo{font-size:26px}
  .songTitle{font-size:17px}
  .checkGrid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <header class="hero">
    <div class="heroTop">
      <div>
        <div class="logo">MUSIC<br>LIBRARY</div>
        <div class="sub">Studio Wonda Song Archive</div>
      </div>
      <button id="adminBtn" class="adminBtn">🔒 Admin</button>
    </div>
    <div class="status">
      <span id="songTotal" class="pill">曲数 0</span>
      <span id="tagTotal" class="pill">タグ 0</span>
      <span id="adminStatus" class="pill">閲覧モード</span>
    </div>
  </header>

  <section id="adminPanel" class="adminPanel">
    <h2>管理モード</h2>
    <div class="notice">
      追加・編集はこの端末のブラウザ内に保存されます。GitHubへ反映する場合は、下の「data.js用データ出力」をコピーして差し替えてください。<br>
      data.jsを直接更新した後は「data.js再読込」を押すと、最新のdata.jsを読み直します。
    </div>

    <div class="formGrid" style="margin-top:12px;">
      <input id="songTitleInput" class="input" placeholder="曲名">
      <input id="songArtistInput" class="input" placeholder="アーティスト">
      <input id="songUrlInput" class="input" placeholder="YouTube URL">
      <textarea id="songCommentInput" class="textarea" placeholder="一言コメント"></textarea>
      <div id="tagChecks" class="checkGrid"></div>
      <button id="saveSongBtn" class="mainBtn">曲を保存</button>
      <button id="clearEditBtn" class="mainBtn dangerBtn">入力をリセット</button>
    </div>

    <hr style="border:none;border-top:3px solid #241200;margin:18px 0;">

    <div class="formGrid">
      <input id="newTagKeyInput" class="input" placeholder="タグID 例：kohki_select">
      <input id="newTagLabelInput" class="input" placeholder="表示名 例：⭐ Kohki Select">
      <button id="addTagBtn" class="mainBtn">タグ追加</button>
    </div>

    <hr style="border:none;border-top:3px solid #241200;margin:18px 0;">

    <div class="formGrid">
      <button id="exportBtn" class="mainBtn">data.js用データ出力</button>
      <button id="reloadDataBtn" class="mainBtn reloadBtn">data.js再読込</button>
      <textarea id="exportArea" class="textarea" style="margin-top:10px;min-height:160px;" readonly placeholder="ここに出力されます"></textarea>
    </div>
  </section>

  <section class="searchBox">
    <input id="searchInput" class="searchInput" placeholder="曲名・アーティスト・コメント検索">
    <div id="tagTabs" class="tagTabs"></div>
  </section>

  <section class="sectionTitle">
    <h2 id="currentTitle">📀 ALL SONGS</h2>
    <div id="currentCount" class="count">0曲</div>
  </section>

  <main id="songList" class="songList"></main>

  <div class="footer">© Studio Wonda Music Library</div>
</div>

<script src="data.js"></script>
<script>
'use strict';

const SAVE_KEY = 'wonda_music_library_v1';
const ADMIN_CODE = '0321';

let state = loadState();
let activeTag = 'all';
let editingId = null;
let isAdmin = localStorage.getItem('wonda_music_admin') === '1';

function clone(obj){
  return JSON.parse(JSON.stringify(obj));
}

function loadState(){
  const saved = localStorage.getItem(SAVE_KEY);
  if(saved){
    try{
      return JSON.parse(saved);
    }catch(e){}
  }
  return {
    tags:clone(DEFAULT_TAGS),
    songs:clone(DEFAULT_SONGS)
  };
}

function saveState(){
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

function reloadDefaultData(){
  if(!confirm('現在この端末に保存されている編集データを破棄して、data.jsを再読込しますか？\n\n※必要なら先に「data.js用データ出力」で保存してください。')){
    return;
  }

  state = {
    tags:clone(DEFAULT_TAGS),
    songs:clone(DEFAULT_SONGS)
  };

  activeTag = 'all';
  editingId = null;
  saveState();
  clearForm();
  document.getElementById('searchInput').value = '';
  document.getElementById('exportArea').value = '';
  renderAll();

  alert('data.jsを再読込しました。');
}

function esc(text){
  return String(text || '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function normalize(text){
  return String(text || '').toLowerCase();
}

function getTagLabel(key){
  const tag = state.tags.find(t => t.key === key);
  return tag ? tag.label : key;
}

function renderAll(){
  renderStatus();
  renderTagTabs();
  renderTagChecks();
  renderSongs();
  renderAdmin();
}

function renderStatus(){
  document.getElementById('songTotal').textContent = `曲数 ${state.songs.length}`;
  document.getElementById('tagTotal').textContent = `タグ ${state.tags.length}`;
  document.getElementById('adminStatus').textContent = isAdmin ? '管理モード' : '閲覧モード';
}

function renderAdmin(){
  document.getElementById('adminPanel').classList.toggle('show', isAdmin);
  document.getElementById('adminBtn').textContent = isAdmin ? '🔓 Admin ON' : '🔒 Admin';
}

function renderTagTabs(){
  const root = document.getElementById('tagTabs');
  const tabs = [{key:'all', label:'📀 ALL SONGS'}, ...state.tags];

  root.innerHTML = tabs.map(tag => `
    <button class="tagBtn ${activeTag === tag.key ? 'active' : ''}" data-tag="${esc(tag.key)}">
      ${esc(tag.label)}
    </button>
  `).join('');

  root.querySelectorAll('.tagBtn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeTag = btn.dataset.tag;
      renderSongs();
      renderTagTabs();
    });
  });
}

function renderTagChecks(){
  const root = document.getElementById('tagChecks');
  root.innerHTML = state.tags.map(tag => `
    <label class="checkItem">
      <input type="checkbox" value="${esc(tag.key)}">
      <span>${esc(tag.label)}</span>
    </label>
  `).join('');
}

function getFilteredSongs(){
  const q = normalize(document.getElementById('searchInput').value);
  return state.songs.filter(song=>{
    const tagOk = activeTag === 'all' || (song.tags || []).includes(activeTag);
    const text = normalize(`${song.title} ${song.artist} ${song.comment}`);
    const searchOk = !q || text.includes(q);
    return tagOk && searchOk;
  });
}

function renderSongs(){
  const root = document.getElementById('songList');
  const songs = getFilteredSongs();
  const title = activeTag === 'all' ? '📀 ALL SONGS' : getTagLabel(activeTag);

  document.getElementById('currentTitle').textContent = title;
  document.getElementById('currentCount').textContent = `${songs.length}曲`;

  root.innerHTML = songs.map(song => `
    <article class="songCard">
      <h3 class="songTitle">${esc(song.title)}</h3>
      <div class="artist">${esc(song.artist || 'Unknown Artist')}</div>

      <div class="songTags">
        ${(song.tags || []).map(tag => `
          <button class="songTag" type="button" data-jump-tag="${esc(tag)}">
            ${esc(getTagLabel(tag))}
          </button>
        `).join('')}
      </div>

      <p class="comment">${esc(song.comment)}</p>

      <div class="actions">
        ${song.url ? `<a class="linkBtn" href="${esc(song.url)}" target="_blank" rel="noopener">▶ YouTube</a>` : ''}
        ${isAdmin ? `<button class="smallBtn editBtn" data-id="${esc(song.id)}">編集</button><button class="smallBtn deleteBtn" data-id="${esc(song.id)}">削除</button>` : ''}
      </div>
    </article>
  `).join('');

  root.querySelectorAll('.songTag').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeTag = btn.dataset.jumpTag;
      document.getElementById('searchInput').value = '';
      renderTagTabs();
      renderSongs();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });

  root.querySelectorAll('.editBtn').forEach(btn=>{
    btn.addEventListener('click',()=>startEdit(btn.dataset.id));
  });

  root.querySelectorAll('.deleteBtn').forEach(btn=>{
    btn.addEventListener('click',()=>deleteSong(btn.dataset.id));
  });
}

function getFormTags(){
  return Array.from(document.querySelectorAll('#tagChecks input:checked')).map(i=>i.value);
}

function setFormTags(tags){
  document.querySelectorAll('#tagChecks input').forEach(i=>{
    i.checked = (tags || []).includes(i.value);
  });
}

function clearForm(){
  editingId = null;
  document.getElementById('songTitleInput').value = '';
  document.getElementById('songArtistInput').value = '';
  document.getElementById('songUrlInput').value = '';
  document.getElementById('songCommentInput').value = '';
  setFormTags([]);
  document.getElementById('saveSongBtn').textContent = '曲を保存';
}

function startEdit(id){
  const song = state.songs.find(s=>s.id === id);
  if(!song) return;

  editingId = id;
  document.getElementById('songTitleInput').value = song.title || '';
  document.getElementById('songArtistInput').value = song.artist || '';
  document.getElementById('songUrlInput').value = song.url || '';
  document.getElementById('songCommentInput').value = song.comment || '';
  setFormTags(song.tags || []);
  document.getElementById('saveSongBtn').textContent = '編集を保存';
  window.scrollTo({top:document.getElementById('adminPanel').offsetTop - 10, behavior:'smooth'});
}

function saveSong(){
  const title = document.getElementById('songTitleInput').value.trim();
  const artist = document.getElementById('songArtistInput').value.trim();
  const url = document.getElementById('songUrlInput').value.trim();
  const comment = document.getElementById('songCommentInput').value.trim();
  const tags = getFormTags();

  if(!title){
    alert('曲名を入力してください');
    return;
  }

  if(editingId){
    const song = state.songs.find(s=>s.id === editingId);
    if(song){
      song.title = title;
      song.artist = artist;
      song.url = url;
      song.comment = comment;
      song.tags = tags;
    }
  }else{
    state.songs.unshift({
      id:'song_' + Date.now(),
      title,
      artist,
      url,
      comment,
      tags
    });
  }

  saveState();
  clearForm();
  renderAll();
}

function deleteSong(id){
  if(!confirm('この曲を削除しますか？')) return;
  state.songs = state.songs.filter(s=>s.id !== id);
  saveState();
  renderAll();
}

function addTag(){
  const key = document.getElementById('newTagKeyInput').value.trim();
  const label = document.getElementById('newTagLabelInput').value.trim();

  if(!key || !label){
    alert('タグIDと表示名を入力してください');
    return;
  }

  if(!/^[a-zA-Z0-9_-]+$/.test(key)){
    alert('タグIDは半角英数字・ハイフン・アンダーバーのみです');
    return;
  }

  if(state.tags.some(t=>t.key === key)){
    alert('同じタグIDが既にあります');
    return;
  }

  state.tags.push({key,label});
  saveState();

  document.getElementById('newTagKeyInput').value = '';
  document.getElementById('newTagLabelInput').value = '';

  renderAll();
}

function exportData(){
  const text =
`'use strict';

const DEFAULT_TAGS = ${JSON.stringify(state.tags,null,2)};

const DEFAULT_SONGS = ${JSON.stringify(state.songs,null,2)};
`;
  document.getElementById('exportArea').value = text;
}

document.getElementById('adminBtn').addEventListener('click',()=>{
  if(isAdmin){
    isAdmin = false;
    localStorage.removeItem('wonda_music_admin');
    renderAll();
    return;
  }

  const code = prompt('管理者コードを入力');
  if(code === ADMIN_CODE){
    isAdmin = true;
    localStorage.setItem('wonda_music_admin','1');
    renderAll();
  }else if(code !== null){
    alert('コードが違います');
  }
});

document.getElementById('saveSongBtn').addEventListener('click',saveSong);
document.getElementById('clearEditBtn').addEventListener('click',clearForm);
document.getElementById('addTagBtn').addEventListener('click',addTag);
document.getElementById('exportBtn').addEventListener('click',exportData);
document.getElementById('reloadDataBtn').addEventListener('click',reloadDefaultData);
document.getElementById('searchInput').addEventListener('input',renderSongs);

renderAll();
</script>
</body>
</html>
