<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マインドAIサポート</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:sans-serif;
color:#fff;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.hidden{
display:none;
}

#words{
position:absolute;
inset:0;
overflow:hidden;
pointer-events:none;
}

.word{
position:absolute;
opacity:.18;
font-weight:bold;
animation:float 12s linear infinite;
white-space:nowrap;
}

@keyframes float{
0%{
transform:translateY(40px) scale(.8);
opacity:0;
}
20%{
opacity:.25;
}
80%{
opacity:.25;
}
100%{
transform:translateY(-120px) scale(1.2);
opacity:0;
}
}

#title{
font-size:clamp(40px,8vw,90px);
font-weight:900;
letter-spacing:4px;
text-align:center;
animation:fadeIn 2s ease;
text-shadow:
0 0 10px #fff,
0 0 30px #fff;
z-index:2;
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

.message{
margin-top:30px;
font-size:20px;
opacity:.9;
text-align:center;
}

.btn{
margin-top:40px;
padding:14px 40px;
font-size:18px;
border:none;
border-radius:999px;
background:white;
color:black;
cursor:pointer;
}

#viewer img{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

#nextBtn{
position:absolute;
bottom:20px;
right:20px;
z-index:20;
}

.done{
font-size:32px;
text-align:center;
padding:20px;
}
</style>
</head>
<body>

<div id="titleScreen" class="screen">

<div id="words"></div>

<div id="title">
マインドAIサポート
</div>

<div class="message">
深呼吸をして次へ進んでください
</div>

<button class="btn" id="startBtn">
次へ
</button>

</div>

<div id="viewer" class="screen hidden">

<img id="slideImage">

<button class="btn" id="nextBtn">
次へ
</button>

</div>

<div id="finished" class="screen hidden">
<div class="done">
既に閲覧済みです
</div>
</div>

<script>

const SAVE_KEY="mind_ai_support_finished";

const images=[
"1.png",
"12.png",
"13.png",
"14.png",
"15.png",
"20.png",
"19.png",
"16.png",
"17.png",
"18.png",
"21.png",
"22.png"
];

if(localStorage.getItem(SAVE_KEY)){
document.getElementById("titleScreen").classList.add("hidden");
document.getElementById("finished").classList.remove("hidden");
}

const words=[
"強欲",
"性欲",
"睡眠欲",
"努力",
"食欲",
"不安",
"希望",
"未来",
"絶望",
"哀愁",
"愛",
"執着",
"孤独",
"感謝",
"怒り",
"慈悲",
"信念",
"嫉妬",
"幸福",
"後悔",
"恐怖",
"自由"
];

const container=document.getElementById("words");

for(let i=0;i<80;i++){

const div=document.createElement("div");

div.className="word";
div.textContent=words[Math.floor(Math.random()*words.length)];

div.style.left=Math.random()*100+"%";
div.style.top=Math.random()*100+"%";

div.style.fontSize=
(12+Math.random()*70)+"px";

div.style.animationDuration=
(8+Math.random()*12)+"s";

div.style.animationDelay=
(-Math.random()*15)+"s";

container.appendChild(div);

}

let index=0;

const viewer=document.getElementById("viewer");
const title=document.getElementById("titleScreen");
const image=document.getElementById("slideImage");

document.getElementById("startBtn")
.addEventListener("click",()=>{

title.classList.add("hidden");
viewer.classList.remove("hidden");

showImage();

});

function showImage(){

image.src=images[index];

}

document.getElementById("nextBtn")
.addEventListener("click",()=>{

index++;

if(index>=images.length){

localStorage.setItem(
SAVE_KEY,
"true"
);

viewer.classList.add("hidden");

document.getElementById("finished")
.classList.remove("hidden");

return;
}

showImage();

});

</script>

</body>
</html>
